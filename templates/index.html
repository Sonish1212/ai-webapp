<!DOCTYPE html>
<html>
<head>
    <title>AI Tutor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; width: 800px; height: 90vh; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #2c3e50; color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 24px; }
        .header p { font-size: 13px; opacity: 0.7; margin-top: 4px; }
        #chatbox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 15px; }
        .user { background: #2c3e50; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .assistant { background: #f0f0f0; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        .typing { background: #f0f0f0; color: #999; align-self: flex-start; padding: 12px 16px; border-radius: 12px; font-style: italic; }
        .input-area { padding: 16px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        #userInput { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
        #userInput:focus { border-color: #2c3e50; }
        button { padding: 12px 24px; background: #2c3e50; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
        button:hover { background: #34495e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI Tutor</h1>
            <p>Ask me anything — I'll explain it clearly and simply</p>
        </div>
        <div id="chatbox">
            <div class="message assistant">Hello! I'm your AI Tutor. What would you like to learn today?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask me anything..." />
            <button onclick="sendMessage()">Send</button>
	    <button onclick="clearChat()" style="background: #e74c3c;">Clear</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            // Show user message
            addMessage(message, 'user');
            input.value = '';

            // Show typing indicator
            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.id = 'typing';
            typing.textContent = 'Tutor is thinking...';
            document.getElementById('chatbox').appendChild(typing);
            scrollBottom();

            // Send to Flask
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });

            // Remove typing indicator
            document.getElementById('typing').remove();

            const data = await response.json();
            addMessage(data.response, 'assistant');
        }
	async function clearChat(){

	    const response = await fetch('/clear', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
            });
	document.getElementById('chatbox').innerHTML = '';

}

        function addMessage(text, sender) {
            const chatbox = document.getElementById('chatbox');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.textContent = text;
            chatbox.appendChild(div);
            scrollBottom();
        }

        function scrollBottom() {
            const chatbox = document.getElementById('chatbox');
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
