<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Engineer Tutor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f5f6f7;
            --surface: #ffffff;
            --border: #e2e4e8;
            --text-primary: #1a1d23;
            --text-secondary: #6b7280;
            --green: #16a34a;
            --green-light: #dcfce7;
            --green-dark: #15803d;
            --user-bg: #1a1d23;
            --user-text: #ffffff;
            --code-bg: #f8fafc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .app {
            width: 100%;
            max-width: 820px;
            height: 92vh;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo {
            width: 36px; height: 36px;
            background: var(--green);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .header-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
        .header-sub { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
        .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--green); font-weight: 500; }
        .status-dot {
            width: 7px; height: 7px;
            background: var(--green); border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        #chatbox {
            flex: 1; overflow-y: auto; padding: 24px;
            display: flex; flex-direction: column; gap: 16px;
            scroll-behavior: smooth;
        }
        #chatbox::-webkit-scrollbar { width: 4px; }
        #chatbox::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .message-wrap { display: flex; flex-direction: column; gap: 4px; }
        .message-wrap.user { align-items: flex-end; }
        .message-wrap.assistant { align-items: flex-start; }
        .sender-label {
            font-size: 11px; font-weight: 500; color: var(--text-secondary);
            padding: 0 4px; letter-spacing: 0.03em; text-transform: uppercase;
        }
        .message {
            max-width: 78%; padding: 12px 16px; border-radius: 12px;
            font-size: 14px; line-height: 1.65;
        }
        .message.user {
            background: var(--user-bg); color: var(--user-text);
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            background: var(--bg); color: var(--text-primary);
            border: 1px solid var(--border); border-bottom-left-radius: 4px;
        }
        .message.assistant h1, .message.assistant h2, .message.assistant h3 {
            font-size: 14px; font-weight: 600; color: var(--text-primary); margin: 12px 0 6px;
        }
        .message.assistant p { margin-bottom: 8px; }
        .message.assistant p:last-child { margin-bottom: 0; }
        .message.assistant ul, .message.assistant ol { padding-left: 18px; margin-bottom: 8px; }
        .message.assistant li { margin-bottom: 4px; }
        .message.assistant code {
            font-family: 'JetBrains Mono', monospace; font-size: 12px;
            background: var(--code-bg); border: 1px solid var(--border);
            padding: 2px 6px; border-radius: 4px; color: var(--green-dark);
        }
        .message.assistant pre {
            background: var(--code-bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0;
        }
        .message.assistant pre code { background: none; border: none; padding: 0; font-size: 12px; color: var(--text-primary); }
        .message.assistant strong { font-weight: 600; color: var(--text-primary); }
        .typing {
            display: flex; align-items: center; gap: 4px;
            padding: 12px 16px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 12px;
            border-bottom-left-radius: 4px; width: fit-content;
        }
        .typing span {
            width: 6px; height: 6px; background: var(--text-secondary);
            border-radius: 50%; animation: bounce 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        .input-area { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--surface); }
        .input-row { display: flex; gap: 10px; align-items: center; }
        #userInput {
            flex: 1; padding: 11px 16px;
            border: 1px solid var(--border); border-radius: 10px;
            font-size: 14px; font-family: 'Inter', sans-serif;
            color: var(--text-primary); background: var(--bg);
            outline: none; transition: border-color 0.15s;
        }
        #userInput:focus { border-color: var(--green); background: white; }
        #userInput::placeholder { color: var(--text-secondary); }
        .btn-send {
            padding: 11px 20px; background: var(--green); color: white;
            border: none; border-radius: 10px; font-size: 14px; font-weight: 500;
            font-family: 'Inter', sans-serif; cursor: pointer; transition: background 0.15s;
        }
        .btn-send:hover { background: var(--green-dark); }
        .btn-clear {
            padding: 11px 16px; background: transparent; color: var(--text-secondary);
            border: 1px solid var(--border); border-radius: 10px; font-size: 13px;
            font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s;
        }
        .btn-clear:hover { background: #fef2f2; color: #dc2626; border-color: #fecaca; }
        .input-hint { font-size: 11px; color: var(--text-secondary); margin-top: 8px; text-align: center; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="header-left">
                <div class="logo">🤖</div>
                <div>
                    <div class="header-title">AI Engineer Tutor</div>
                    <div class="header-sub">Your personal path to AI engineering</div>
                </div>
            </div>
            <div class="status"><div class="status-dot"></div>Online</div>
        </div>

        <div id="chatbox">
            <div class="message-wrap assistant">
                <div class="sender-label">Tutor</div>
                <div class="message assistant">
                    Welcome. I'm here to make you an AI engineer — step by step, with real examples and practice questions.<br><br>
                    What do you want to learn today?
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-row">
                <input type="text" id="userInput" placeholder="Ask anything about AI engineering..." />
                <button class="btn-send" onclick="sendMessage()">Send</button>
                <button class="btn-clear" onclick="clearChat()">Clear</button>
            </div>
            <div class="input-hint">Press Enter to send</div>
        </div>
    </div>

    <script>
        marked.setOptions({ breaks: true, gfm: true });

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;
            addMessage(message, 'user');
            input.value = '';

            const chatbox = document.getElementById('chatbox');
            const typingWrap = document.createElement('div');
            typingWrap.className = 'message-wrap assistant';
            typingWrap.id = 'typing-wrap';
            typingWrap.innerHTML = `<div class="sender-label">Tutor</div><div class="typing"><span></span><span></span><span></span></div>`;
            chatbox.appendChild(typingWrap);
            scrollBottom();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                document.getElementById('typing-wrap')?.remove();
                const data = await response.json();
                addMessage(data.response, 'assistant');
            } catch (err) {
                document.getElementById('typing-wrap')?.remove();
                addMessage('Something went wrong. Please try again.', 'assistant');
            }
        }

        function addMessage(text, sender) {
            const chatbox = document.getElementById('chatbox');
            const wrap = document.createElement('div');
            wrap.className = `message-wrap ${sender}`;
            const label = document.createElement('div');
            label.className = 'sender-label';
            label.textContent = sender === 'user' ? 'You' : 'Tutor';
            const msg = document.createElement('div');
            msg.className = `message ${sender}`;
            if (sender === 'assistant') {
                msg.innerHTML = marked.parse(text);
            } else {
                msg.textContent = text;
            }
            wrap.appendChild(label);
            wrap.appendChild(msg);
            chatbox.appendChild(wrap);
            scrollBottom();
        }

        async function clearChat() {
            await fetch('/clear', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
            document.getElementById('chatbox').innerHTML = `
                <div class="message-wrap assistant">
                    <div class="sender-label">Tutor</div>
                    <div class="message assistant">Chat cleared. Fresh start — what do you want to learn?</div>
                </div>`;
        }

        function scrollBottom() {
            const chatbox = document.getElementById('chatbox');
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
